<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfis | LOVEFLIX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="profiles-body">
  <main class="profiles-page">
    <h1>Quem está assistindo?</h1>

    <div class="profiles-grid">
      <button class="profile-card" data-profile="me">
        <div class="profile-avatar">
          <img src="assets/thumbs/profile1.png" alt="Meu perfil">
        </div>
        <span>Eu</span>
      </button>

      <button class="profile-card" data-profile="ela">
        <div class="profile-avatar">
          <img src="assets/thumbs/profile2.png" alt="Perfil dela">
        </div>
        <span>Você ❤</span>
      </button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
